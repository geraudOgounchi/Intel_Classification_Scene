<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Intel Image Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 4px;
      background: linear-gradient(90deg, #6366f1, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 36px;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #3b4265;
      border-radius: 12px;
      padding: 36px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #6366f1;
      background: rgba(99,102,241,0.05);
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-zone .icon { font-size: 2.4rem; margin-bottom: 8px; }
    .drop-zone p { font-size: 0.85rem; color: #64748b; }
    .drop-zone p span { color: #6366f1; font-weight: 600; }

    /* Preview */
    #preview-wrap {
      display: none;
      margin-bottom: 20px;
      border-radius: 10px;
      overflow: hidden;
    }
    #preview-wrap img {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 10px;
    }

    /* Backend selector */
    .backend-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .backend-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid #2d3148;
      background: transparent;
      color: #94a3b8;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .backend-btn.active {
      border-color: #6366f1;
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
    }

    /* Predict button */
    #predict-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #6366f1, #06b6d4);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 24px;
    }
    #predict-btn:hover { opacity: 0.88; }
    #predict-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Results */
    #result-box { display: none; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .badge {
      background: rgba(99,102,241,0.2);
      color: #a5b4fc;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .top-label { font-size: 1.25rem; font-weight: 700; }
    .top-conf  { font-size: 0.85rem; color: #64748b; }

    /* Bars */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }
    .bar-label {
      width: 80px;
      font-size: 0.8rem;
      color: #94a3b8;
      text-align: right;
      flex-shrink: 0;
    }
    .bar-track {
      flex: 1;
      background: #2d3148;
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #6366f1, #06b6d4);
      transition: width 0.6s ease;
    }
    .bar-pct {
      width: 42px;
      font-size: 0.78rem;
      color: #64748b;
      text-align: right;
      flex-shrink: 0;
    }

    /* Error */
    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fca5a5;
      font-size: 0.85rem;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1> Intel Image Classifier</h1>
  <p class="subtitle">buildings · forest · glacier · mountain · sea · street</p>

  <div class="card">

    <!-- Drop zone -->
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" />
      <div class="icon"></div>
      <p> <span>Put here your to predict</span></p>
    </div>

    <!-- Preview -->
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="preview" />
    </div>

    <!-- Backend -->
    <div class="backend-row">
      <button class="backend-btn active" data-backend="PyTorch"> PyTorch</button>
      <button class="backend-btn"        data-backend="Keras"> Keras</button>
    </div>

    <!-- Predict -->
    <button id="predict-btn" disabled>Predict</button>

    <!-- Results -->
    <div id="result-box"></div>

  </div>

  <script>
    let selectedFile    = null;
    let selectedBackend = "PyTorch";

    // Backend toggle 
    document.querySelectorAll(".backend-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".backend-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedBackend = btn.dataset.backend;
      });
    });

    // File input
    const fileInput  = document.getElementById("file-input");
    const dropZone   = document.getElementById("drop-zone");
    const predictBtn = document.getElementById("predict-btn");
    const preview    = document.getElementById("preview-img");
    const previewWrap = document.getElementById("preview-wrap");

    fileInput.addEventListener("change", () => handleFile(fileInput.files[0]));

    dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", ()  => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file || !file.type.startsWith("image/")) return;
      selectedFile = file;
      const url = URL.createObjectURL(file);
      preview.src       = url;
      previewWrap.style.display = "block";
      predictBtn.disabled = false;
      document.getElementById("result-box").style.display = "none";
    }

    // Predict 
    predictBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      predictBtn.disabled = true;
      predictBtn.innerHTML = '<span class="spinner"></span> Analysis in progress…';

      const formData = new FormData();
      formData.append("image",   selectedFile);
      formData.append("backend", selectedBackend);

      try {
        const res  = await fetch("/predict", { method: "POST", body: formData });
        const data = await res.json();
        renderResult(data);
      } catch (err) {
        renderError("Network Error : " + err.message);
      } finally {
        predictBtn.disabled = false;
        predictBtn.textContent = "Predict";
      }
    });

    // ── Render ───────────────────────────────────────────────
    function renderResult(data) {
      const box = document.getElementById("result-box");
      box.style.display = "block";

      if (data.error) { renderError(data.error); return; }

      const EMOJIS = {
        buildings: "", forest: "", glacier: "",
        mountain: "",  sea: "",    street: ""
      };

      let html = `
        <div class="result-header">
          <span class="badge">${data.backend}</span>
          <div>
            <div class="top-label">${EMOJIS[data.prediction] || "--"} ${data.prediction}</div>
            <div class="top-conf">${data.confidence}% confidence</div>
          </div>
        </div>`;

      data.all.forEach(item => {
        html += `
          <div class="bar-row">
            <div class="bar-label">${item.class}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${item.confidence}%"></div>
            </div>
            <div class="bar-pct">${item.confidence}%</div>
          </div>`;
      });

      box.innerHTML = html;
    }

    function renderError(msg) {
      const box = document.getElementById("result-box");
      box.style.display = "block";
      box.innerHTML = `<div class="error-msg"> ${msg}</div>`;
    }
  </script>
</body>
</html>
